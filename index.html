<script>
    // ---------- Chapter 18 questions (exact, in given order) ----------
    const questions = [
        {   //1
            id: 1,
            question: "The nurse is providing client teaching to a young parent who has brought their 3-month-old infant to the clinic for a well-baby checkup. Which recommendation will the nurse make to the client to prevent the transmission of organisms to the infant during the cold season?",
            options: [
                "A. Wash hands frequently.",
                "B. Gargle with warm salt water regularly.",
                "C. Dress self and infant warmly.",
                "D. Take preventative antibiotics as prescribed."
            ],
            correct: 0, //A
            rationale: "Handwashing remains the most effective preventive measure to reduce transmission of organisms. Antibiotics are not prescribed for a cold; salt water gargles and dressing warmly do not suppress transmission. (PTS:1 REF:p.498)"
        },
        {   //2
            id: 2,
            question: "A client visiting the clinic is diagnosed with acute sinusitis. To promote sinus drainage, the nurse should instruct the client to perform which action?",
            options: [
                "A. Apply a cold pack to the affected area.",
                "B. Apply heat to the forehead.",
                "C. Perform postural drainage.",
                "D. Increase fluid intake."
            ],
            correct: 3, //D
            rationale: "Increasing fluid intake and elevating the head of the bed promote sinus drainage. Cold packs/heat do not promote drainage; postural drainage is for bronchial secretions. (PTS:1 REF:p.502)"
        },
        {   //3
            id: 3,
            question: "The nurse is creating a plan of care for a client diagnosed with acute laryngitis. Which intervention should be included in the client's plan of care?",
            options: [
                "A. Place warm washcloths on the client's throat, as needed.",
                "B. Have the client inhale warm steam three times daily.",
                "C. Encourage the client to limit speech whenever possible.",
                "D. Limit the client's fluid intake to 1.5 L/day."
            ],
            correct: 2, //C
            rationale: "Management of acute laryngitis includes resting the voice, avoiding irritants, and inhaling cool steam. Fluid intake should be increased, not limited. (PTS:1 REF:p.507)"
        },
        {   //4
            id: 4,
            question: "A client is being treated in the emergency department for epistaxis. Pressure has been applied to the client's midline septum for 10 minutes, but the bleeding continues. The nurse should anticipate using which treatment to control the bleeding?",
            options: [
                "A. Irrigation with a hypertonic solution",
                "B. Nasopharyngeal suction",
                "C. Normal saline application",
                "D. Silver nitrate application"
            ],
            correct: 3, //D
            rationale: "If pressure fails, silver nitrate, Gelfoam, electrocautery, or vasoconstrictors may be used. Suction may visualise but does not stop bleeding; saline/hypertonic irrigation not used. (PTS:1 REF:p.512)"
        },
        {   //5
            id: 5,
            question: "The nurse is planning the care of a client who is scheduled for a laryngectomy. The nurse should assign the highest priority to which postoperative nursing diagnosis?",
            options: [
                "A. Anxiety related to diagnosis of cancer",
                "B. Altered nutrition related to swallowing difficulties",
                "C. Ineffective airway clearance related to airway alterations",
                "D. Impaired verbal communication related to removal of the larynx"
            ],
            correct: 2, //C
            rationale: "Ineffective airway clearance is the priority for all conditions. While other diagnoses are valid, airway always comes first. (PTS:1 REF:p.516)"
        },
        {   //6
            id: 6,
            question: "The home care nurse is assessing the home environment of a client who will be discharged from the hospital shortly after a laryngectomy. The nurse should encourage the client to use which appliance during recovery at home?",
            options: [
                "A. A room humidifier",
                "B. An air conditioner",
                "C. A water purifier",
                "D. A radiant heater"
            ],
            correct: 0, //A
            rationale: "Humidification is essential after laryngectomy. Air conditioning may be too drying; purifier/heater not necessary. (PTS:1 REF:p.519)"
        },
        {   //7
            id: 7,
            question: "The nurse is caring for a client whose recent unexplained weight loss and history of smoking have prompted diagnostic testing. Which symptom is most closely associated with the early stages of laryngeal cancer?",
            options: [
                "A. Hoarseness",
                "B. Dyspnea",
                "C. Dysphagia",
                "D. Frequent nosebleeds"
            ],
            correct: 0, //A
            rationale: "Hoarseness is an early symptom of laryngeal cancer. Dyspnea, dysphagia, lumps are later signs; nosebleeds not associated. (PTS:1 REF:p.515)"
        },
        {   //8
            id: 8,
            question: "The nurse is caring for a client who needs education on medication therapy for allergic rhinitis. The client is to take cromolyn daily. In providing education for this client, how should the nurse describe the action of the medication?",
            options: [
                "A. It inhibits the release of histamine and other chemicals.",
                "B. It inhibits the action of proton pumps.",
                "C. It inhibits the action of the sodium-potassium pump in the nasal epithelium.",
                "D. It causes bronchodilation and relaxes smooth muscle in the bronchi."
            ],
            correct: 0, //A
            rationale: "Cromolyn inhibits release of histamine and other chemicals. Beta-adrenergics cause bronchodilation; it does not affect proton or Na/K pumps. (PTS:1 REF:p.497)"
        },
        {   //9
            id: 9,
            question: "The nurse is caring for a client who presents with a severe nosebleed. The site of bleeding appears to be the anterior portion of the nasal septum. The nurse instructs the client to tilt the head forward, and the nurse applies pressure to the nose, but the client's nose continues to bleed. Which intervention should the nurse next implement?",
            options: [
                "A. Apply ice to the bridge of the nose.",
                "B. Lay the client down.",
                "C. Arrange for transfer to the local emergency department.",
                "D. Insert a cotton tampon in the affected nare."
            ],
            correct: 3, //D
            rationale: "A cotton tampon may be used to try to stop bleeding. Ice has no scientific basis; laying client down could block airway; ED transfer only if bleeding becomes serious. (PTS:1 REF:p.512)"
        },
        {   //10
            id: 10,
            question: "The emergency department (ED) nurse is assessing a young gymnast who fell from a balance beam. The gymnast presents with a clear fluid leaking from the nose. Which condition should the ED nurse suspect?",
            options: [
                "A. Fracture of the cribriform plate",
                "B. Rupture of an ethmoid sinus",
                "C. Abrasion of the soft tissue",
                "D. Fracture of the nasal septum"
            ],
            correct: 0, //A
            rationale: "Clear fluid from nostril suggests fracture of cribriform plate with leakage of CSF. Not abrasion or sinus rupture; septum fracture does not cause CSF leak. (PTS:1 REF:p.513)"
        },
        {   //11
            id: 11,
            question: "A 42-year-old client is admitted to the ED after an assault. The client received blunt trauma to the face and has a suspected nasal fracture. What intervention should the nurse perform?",
            options: [
                "A. Administer nasal spray and apply an occlusive dressing to the client's face.",
                "B. Position the client's head in a dependent position.",
                "C. Irrigate the client's nose with warm tap water.",
                "D. Apply ice and keep the client's head elevated."
            ],
            correct: 3, //D
            rationale: "Immediately after fracture, apply ice and keep head elevated to decrease swelling. Dependent position exacerbates bleeding; irrigation/occlusive dressing not used. (PTS:1 REF:p.513)"
        },
        {   //12
            id: 12,
            question: "The occupational health nurse is obtaining a client history during a pre-employment physical. During the history, the client reports having hereditary angioedema. The nurse should identify which implication of this health condition?",
            options: [
                "A. It will result in increased loss of work days.",
                "B. It may cause episodes of weakness due to reduced cardiac output.",
                "C. It can cause life-threatening airway obstruction.",
                "D. It is a risk factor for ischemic heart disease."
            ],
            correct: 2, //C
            rationale: "Hereditary angioedema is characterized by episodes of life-threatening laryngeal edema. Not associated with cardiac output, work loss, or ischemic disease. (PTS:1 REF:p.514)"
        },
        {   //13
            id: 13,
            question: "The nurse is conducting a presurgical interview for a client with laryngeal cancer. The client reports drinking approximately 20 oz (600 mL) of vodka per day. It is imperative that the nurse inform the surgical team so the client can be assessed for risk of which condition?",
            options: [
                "A. Increased risk for infection",
                "B. Delirium tremens",
                "C. Depression",
                "D. Nonadherence to postoperative care"
            ],
            correct: 1, //B
            rationale: "Given high alcohol intake, the client is at risk for delirium tremens during withdrawal post-surgery. Infection is a general risk but not most immediate; depression and nonadherence are not the critical short-term risks. (PTS:1 REF:p.518)"
        },
        {   //14
            id: 14,
            question: "The nurse is explaining the safe and effective administration of nasal spray to a client with seasonal allergies. What information is most important to include in this teaching?",
            options: [
                "A. Finish the bottle of nasal spray to clear the infection effectively.",
                "B. Nasal spray can only be shared between immediate family members.",
                "C. Nasal spray should be given in a prone position.",
                "D. Overuse of nasal spray may cause rebound congestion."
            ],
            correct: 3, //D
            rationale: "Overuse of topical decongestants may cause rebound congestion. Head should be back for maximal distribution, and bottle not shared. (PTS:1 REF:p.500)"
        },
        {   //15
            id: 15,
            question: "The nurse has been caring for a client who has been prescribed an antibiotic for pharyngitis and has been instructed to take the antibiotic for 10 days. On day 4, the client is feeling better and plans to stop taking the medication. What information should the nurse provide?",
            options: [
                "A. Keep the remaining tablets for an infection at a later time.",
                "B. Discontinue the medications if the fever is gone.",
                "C. Dispose of the remaining medication in a biohazard receptacle.",
                "D. Finish all the antibiotics to eliminate the organism completely."
            ],
            correct: 3, //D
            rationale: "The full course of antibiotics must be taken to eliminate microorganisms completely, even if symptoms improve. Leftover antibiotics should never be kept; disposal not needed in biohazard. (PTS:1 REF:p.500)"
        },
        {   //16
            id: 16,
            question: "A nurse practitioner has provided care for three different clients with chronic pharyngitis over the past several months. Which client is at greatest risk for developing chronic pharyngitis?",
            options: [
                "A. A client who is a habitual user of alcohol and tobacco",
                "B. A client who is a habitual user of caffeine and other stimulants",
                "C. A client who eats a diet high in spicy foods",
                "D. A client who has gastrointestinal reflux disease (GERD)"
            ],
            correct: 0, //A
            rationale: "Chronic pharyngitis is common in adults who habitually use alcohol and tobacco. Caffeine, spicy foods, GERD are not noted primary risk factors. (PTS:1 REF:p.504)"
        },
        {   //17
            id: 17,
            question: "The perioperative nurse has admitted a client who has just undergone a tonsillectomy. The nurse's postoperative assessment should prioritize which potential complication of this surgery?",
            options: [
                "A. Difficulty ambulating",
                "B. Hemorrhage",
                "C. Infrequent swallowing",
                "D. Bradycardia"
            ],
            correct: 1, //B
            rationale: "Hemorrhage is a potential complication of tonsillectomy. Frequent swallowing may indicate bleeding; difficulty ambulating, bradycardia not common. (PTS:1 REF:p.506)"
        },
        {   //18
            id: 18,
            question: "A 45-year-old obese man arrives in a clinic reporting daytime sleepiness, difficulty going to sleep at night, and snoring. The nurse should recognize the manifestations of which health problem?",
            options: [
                "A. Adenoiditis",
                "B. Chronic tonsillitis",
                "C. Obstructive sleep apnea",
                "D. Laryngeal cancer"
            ],
            correct: 2, //C
            rationale: "Obstructive sleep apnea occurs in older, overweight men; symptoms include excessive daytime sleepiness, insomnia, snoring. Not typical for tonsillitis/adenoiditis or cancer. (PTS:1 REF:p.510)"
        },
        {   //19
            id: 19,
            question: "The nurse is caring for a client with epistaxis in the emergency department. Which information should the nurse include in client discharge teaching as a way to prevent epistaxis?",
            options: [
                "A. Keep nasal passages clear.",
                "B. Use decongestants regularly.",
                "C. Humidify the indoor environment.",
                "D. Use a tissue when blowing the nose."
            ],
            correct: 2, //C
            rationale: "Adequate humidification prevents drying of nasal passages. Avoid forceful nose blowing, straining, picking. Decongestants are not indicated. (PTS:1 REF:p.512)"
        },
        {   //20
            id: 20,
            question: "The nurse is caring for a client who is postoperative day 2 following a total laryngectomy for supraglottic cancer. The nurse should prioritize what assessment?",
            options: [
                "A. Assessment of body image",
                "B. Assessment of jugular venous pressure",
                "C. Assessment of carotid pulse",
                "D. Assessment of swallowing ability"
            ],
            correct: 3, //D
            rationale: "Difficulty swallowing is a common postoperative complication creating aspiration risk. Airway is priority, dysphagia affects airway. Body image important but not priority. (PTS:1 REF:p.520)"
        },
        {   //21
            id: 21,
            question: "The nurse is performing the health interview of a client with chronic rhinosinusitis who experiences frequent nose bleeds. The nurse asks the client about the current medication regimen. Which medication would put the client at a higher risk for recurrent epistaxis?",
            options: [
                "A. Oxymetazoline nasal",
                "B. Beclomethasone",
                "C. Levothyroxine",
                "D. Albuterol"
            ],
            correct: 1, //B
            rationale: "Beclomethasone (corticosteroid) should be avoided in recurrent epistaxis as it increases risk. Others do not increase epistaxis risk. (PTS:1 REF:p.500)"
        },
        {   //22 (multiple response)
            id: 22,
            question: "The nurse is performing a nutritional assessment on a client who has been diagnosed with cancer of the larynx. Which laboratory values would be assessed when determining the nutritional status of the client? Select all that apply.",
            options: [
                "A. White blood cell count",
                "B. Protein level",
                "C. Albumin level",
                "D. Platelet count",
                "E. Glucose level"
            ],
            correct: [1,2,4], // B,C,E  (Protein, Albumin, Glucose)
            rationale: "Nutritional status is determined by protein, albumin, glucose, electrolyte levels. WBC and platelet count do not normally assist in determining nutritional status. (PTS:1 REF:p.518)"
        },
        {   //23
            id: 23,
            question: "The nurse is teaching a client with allergic rhinitis about the safe and effective use of medications. Which information would be the most essential to give this client about preventing possible drug interactions?",
            options: [
                "A. Prescription medications can be safely supplemented with over-the-counter (OTC) medications.",

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[currentQuestion];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'FINISH ➡️' : 'NEXT ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[currentQuestion];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[currentQuestion] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT!';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. Correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[currentQuestion] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[currentQuestion];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
